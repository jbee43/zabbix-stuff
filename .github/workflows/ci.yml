---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON templates
        run: |
          errors=0
          for f in templates/*.json; do
            if ! python3 -c "import json; json.load(open('$f'))" 2>/dev/null; then
              echo "FAIL: $f"
              errors=$((errors + 1))
            else
              echo "  OK: $f"
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "$errors file(s) failed JSON validation"
            exit 1
          fi
          echo "All templates are valid JSON."

      - name: Lint template structure
        run: python3 scripts/ci/lint-templates.py

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      # shellcheck is pre-installed on ubuntu-latest runners.
      - name: Lint bash scripts
        run: |
          shopt -s nullglob
          files=(scripts/*.sh)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No bash scripts to check."
            exit 0
          fi
          errors=0
          for f in "${files[@]}"; do
            echo "Checking $f..."
            if ! shellcheck -S warning "$f"; then
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "$errors script(s) have shellcheck warnings"
            exit 1
          fi
          echo "All bash scripts passed shellcheck."

  python-lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install --quiet ruff

      - name: Run ruff
        # E=pycodestyle errors, F=pyflakes (unused imports/vars, undefined names),
        # W=warnings, B=common bug patterns. E501 (line length) disabled — cosmetic.
        run: ruff check --select E,F,W,B --ignore E501 scripts/

  yaml-lint:
    name: YAML lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yamllint
        run: pip install --quiet yamllint

      - name: Run yamllint
        run: yamllint .github/ .yamllint.yml

  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Run markdownlint
        run: markdownlint-cli2 "**/*.md" "#node_modules"

  docs:
    name: Docs completeness
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check every template has a doc file
        run: |
          errors=0
          for f in templates/*.json; do
            base=$(basename "$f" .json)
            if [ ! -f "docs/${base}.md" ]; then
              echo "MISSING: docs/${base}.md"
              errors=$((errors + 1))
            else
              echo "  OK: docs/${base}.md"
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "$errors template(s) missing documentation"
            exit 1
          fi
          echo "All templates have documentation."
